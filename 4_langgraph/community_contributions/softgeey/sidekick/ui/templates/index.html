<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideKick</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <div>
            <div class="logo-text">SideKick</div>
            <div class="logo-sub">PM Assistant</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Capabilities</div>

        <div class="nav-item" onclick="useQuickPrompt('Show me my recent emails and flag anything urgent.')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          Email
        </div>

        <div class="nav-item" onclick="useQuickPrompt('What meetings do I have coming up? Give me a prep brief.')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          Calendar
        </div>

        <div class="nav-item" onclick="useQuickPrompt('Help me draft a project status report for the CEO.')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          Tasks
        </div>

        <div class="nav-item" onclick="useQuickPrompt('Research the latest trends in software development outsourcing.')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          Research
        </div>
      </nav>

      <div class="sidebar-footer">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
          <div class="status-dot"></div>
          <span class="status-label">Connected</span>
        </div>
        <div class="model-name" id="modelName">Loading model…</div>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">
      <div class="topbar">
        <span class="topbar-title">Conversation</span>
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="intent-badge general" id="intentBadge">· General</span>
          <button class="reset-btn" id="resetBtn">New Chat</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <div class="quick-prompts">
          <button class="qp-btn" onclick="useQuickPrompt('Draft a follow-up email to a client about a delayed milestone.')">Draft follow-up email</button>
          <button class="qp-btn" onclick="useQuickPrompt('What are the risks in my current sprint and how should I address them?')">Sprint risks</button>
          <button class="qp-btn" onclick="useQuickPrompt('Research top project management tools for software teams in 2025.')">Research PM tools</button>
          <button class="qp-btn" onclick="useQuickPrompt('Help me write a weekly status update for the CEO.')">CEO status update</button>
        </div>

        <div class="input-row">
          <textarea
            id="messageInput"
            placeholder="Ask anything — email, meetings, tasks, research…"
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M22 2L11 13"/>
              <path d="M22 2L15 22l-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>

        <div class="input-hint">
          <span>Shift+Enter for new line · Enter to send</span>
          <span id="intentBadge2"></span>
        </div>
      </div>
    </main>

  </div>

  <script src="/static/app.js"></script>
  <script>
    // Fetch and display model name
    fetch('/health').then(r => r.json()).then(d => {
      const el = document.getElementById('modelName');
      if (el) el.textContent = d.model || '';
    }).catch(() => {});
  </script>
</body>
</html>
