[project]
name = "crewai_framework_helper"
version = "0.1.0"
description = "CrewAI framework Q&A crew with RAG over upstream source and docs"
readme = "README.md"
requires-python = ">=3.10,<3.14"
dependencies = [
    "crewai[tools]==1.14.4",
    "python-dotenv>=1.0.0",
    "langchain-chroma>=0.2.6",
    "langchain-openai>=0.3.33",
    "langchain-text-splitters>=0.3.11",
    "chromadb>=1.1.0",
    "pyyaml>=6.0.0",
]

[project.scripts]
crewai_framework_helper = "crewai_framework_helper.main:run"
run_crew = "crewai_framework_helper.main:run"
bootstrap-index = "rag.bootstrap:main"
eval-rag = "eval.eval_rag:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crewai_framework_helper"]

[tool.hatch.build.targets.wheel.force-include]
"rag" = "rag"
"eval" = "eval"

[tool.crewai]
type = "crew"
