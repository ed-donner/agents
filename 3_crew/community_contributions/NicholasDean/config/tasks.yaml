research_task:
  description: >
    Research {topic}. List the 5 key points, each with a one-line why-it-matters.
  expected_output: >
    5 bullet points, each a fact plus why it matters.
  agent: researcher

write_task:
  description: >
    Using the research, write a one-page markdown briefing on {topic}.
  expected_output: >
    A markdown briefing: a title, a 2-sentence intro, the 5 points, and a closing takeaway.
  agent: writer
  context:
    - research_task
