[project]
name = "safe_agile_team"
version = "0.1.0"
description = "SAFe_agile_team using crewAI"
authors = [{ name = "Your Name", email = "you@example.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
    "crewai[litellm,tools]==1.11.0",
    "gradio>=6.9.0",
]

[project.scripts]
safe_agile_team = "safe_agile_team.main:run"
run_crew = "safe_agile_team.main:run"
train = "safe_agile_team.main:train"
replay = "safe_agile_team.main:replay"
test = "safe_agile_team.main:test"
run_with_trigger = "safe_agile_team.main:run_with_trigger"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.crewai]
type = "crew"
