[project]
name = "primemash-mini"
version = "0.1.0"
description = "Primemash Mini — Autonomous LinkedIn Marketing Agent (demo)"
requires-python = ">=3.11,<3.13"
dependencies = [
    "openai>=1.75.0",
    "openai-agents>=0.0.14",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
