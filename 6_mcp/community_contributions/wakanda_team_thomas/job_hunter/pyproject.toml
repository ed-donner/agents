[project]
name = "job-hunter"
version = "0.1.0"
description = "Autonomous multi-agent system for automated job hunting"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "openai-agents>=0.0.7",
    "mcp[cli]>=1.0.0",
    "langfuse>=2.0.0",
    "streamlit>=1.30.0",
    "pypdf>=4.0.0",
    "python-docx>=1.0.0",
    "sqlalchemy>=2.0.0",
    "pydantic[email]>=2.0.0",
    "httpx>=0.27.0",
    "apscheduler>=3.10.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]
